<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Uma pergunta rápida</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,500&family=Nunito+Sans:wght@400;600;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <main class="pagina-jogo">

    <h1 class="pergunta">você gosta de mim?</h1>

  
    <div class="area-botoes" id="areaBotoes">

    
      <button type="button" class="botao-sim" id="botaoSim">
        sim
      </button>

      <button type="button" class="botao-nao" id="botaoNao">
        não
      </button>
    </div>

    <p class="contador" id="contador">0/100</p>

  </main>

  <script src="js/script.js"></script>
</body>
</html>
