<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Para Você</title>

  <!-- Fonte usada no site (pode trocar por outra do Google Fonts se quiser) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,500&family=Nunito+Sans:wght@400;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- Folha de estilos externa -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <main class="pagina-inicial">

    <!-- ===================================================== -->
    <!-- FOTO DO CASAL -->
    <!-- Troque o "src" abaixo pelo caminho da sua foto.
         Coloque a imagem dentro da pasta img/ com o nome "casal.jpg"
         (ou altere o nome aqui para o nome do seu arquivo) -->
    <!-- ===================================================== -->
    <section class="hero">
      <div class="polaroid">
        <!-- ALTERE A IMAGEM AQUI -->
        <img src="img/casal.jpg" alt="Foto do casal" class="foto-casal" />
      </div>

      <!-- ALTERE O TEXTO PERSONALIZADO AQUI -->
      <p class="texto-personalizado">
        Escreva aqui uma frase pequena e especial para vocês dois.
      </p>

      <!-- ALTERE O TÍTULO PRINCIPAL AQUI -->
      <h1 class="titulo-principal">para a pessoa que faz tudo fazer sentido</h1>
    </section>

    <!-- ===================================================== -->
    <!-- QUADRO DE DATAS IMPORTANTES -->
    <!-- Edite/adicione quantas datas quiser copiando o bloco
         <li class="data-item"> ... </li> -->
    <!-- ===================================================== -->
    <section class="datas-importantes" aria-label="Datas importantes">
      <h2 class="datas-titulo">nosso fio do tempo</h2>

      <!-- Linha decorativa em formato de "fio" (elemento assinatura do design) -->
      <svg class="fio-decorativo" viewBox="0 0 600 60" preserveAspectRatio="none" aria-hidden="true">
        <path d="M0,30 C 100,0 150,60 250,30 C 350,0 400,60 500,30 C 550,15 580,45 600,30" />
      </svg>

      <ul class="lista-datas">
        <li class="data-item">
          <!-- ALTERE A DATA AQUI -->
          <span class="data-dia">14 de fevereiro</span>
          <!-- ALTERE A DESCRIÇÃO DA DATA AQUI -->
          <span class="data-descricao">o dia em que tudo começou</span>
        </li>
        <li class="data-item">
          <span class="data-dia">--/--</span>
          <span class="data-descricao">adicione outra data especial aqui</span>
        </li>
        <li class="data-item">
          <span class="data-dia">--/--</span>
          <span class="data-descricao">adicione outra data especial aqui</span>
        </li>
      </ul>
    </section>

    <!-- ===================================================== -->
    <!-- BOTÃO PARA A SEGUNDA PÁGINA -->
    <!-- ===================================================== -->
    <section class="secao-botao">
      <a href="jogo.html" class="botao-selo">
        <!-- ALTERE O TEXTO DO BOTÃO AQUI -->
        <span>continuar</span>
      </a>
    </section>

  </main>

</body>
</html>
